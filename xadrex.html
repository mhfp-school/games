<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Xadrez vs Stockfish</title>

<style>
body {
  background: #222;
  color: white;
  font-family: Arial;
  text-align: center;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 70px);
  justify-content: center;
  margin-top: 20px;
}

.square {
  width: 70px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.square img {
  width: 55px;
  height: 55px;
}

.light { background: #eeeed2; }
.dark { background: #769656; }

.selected {
  outline: 3px solid yellow;
}
</style>
</head>

<body>

<h2>♟️ Xadrez vs Stockfish</h2>
<div id="board"></div>
<p id="status">Carregando...</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
const game = new Chess();
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

// peças em SVG (Wikipedia)
const IMG = {
  wp: "https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg",
  wr: "https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg",
  wn: "https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg",
  wb: "https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg",
  wq: "https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg",
  wk: "https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg",

  bp: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg",
  br: "https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg",
  bn: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg",
  bb: "https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg",
  bq: "https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg",
  bk: "https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg"
};

let selected = null;

// usar Stockfish via CDN (corrige carregamento infinito)
const stockfish = new Worker("https://cdn.jsdelivr.net/npm/stockfish/stockfish.js");

stockfish.onmessage = function(e){
  if(e.data.startsWith("bestmove")){
    let move = e.data.split(" ")[1];
    game.move({
      from: move.slice(0,2),
      to: move.slice(2,4),
      promotion: "q"
    });
    draw();
    checkGameState();
  }
};

function draw(){
  boardEl.innerHTML = "";
  const s = game.board();

  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      let d = document.createElement("div");
      d.className = "square " + ((x+y)%2 ? "dark" : "light");

      let p = s[y][x];
      if(p){
        let key = p.color + p.type; // ex: wp, bk
        let img = document.createElement("img");
        img.src = IMG[key];
        d.appendChild(img);
      }

      if(selected && selected.x===x && selected.y===y){
        d.classList.add("selected");
      }

      d.onclick = () => click(x,y);
      boardEl.appendChild(d);
    }
  }
}

function click(x,y){
  const square = "abcdefgh"[x] + (8-y);

  if(selected){
    const from = "abcdefgh"[selected.x] + (8-selected.y);

    let move = game.move({
      from: from,
      to: square,
      promotion: "q"
    });

    selected = null;
    draw();

    if(move){
      checkGameState();
      if(!game.game_over()){
        statusEl.textContent = "Bot pensando...";
        setTimeout(botMove, 200);
      }
    }

  } else {
    let piece = game.get(square);
    if(piece && piece.color === "w"){
      selected = {x,y};
      draw();
    }
  }
}

function botMove(){
  stockfish.postMessage("position fen " + game.fen());
  stockfish.postMessage("go depth 12");
}

function checkGameState(){
  if(game.in_checkmate()){
    statusEl.textContent = "Xeque-mate! " + (game.turn()==='w' ? "Pretas venceram" : "Brancas venceram");
  } else if(game.in_draw()){
    statusEl.textContent = "Empate!";
  } else if(game.in_check()){
    statusEl.textContent = "Xeque!";
  } else {
    statusEl.textContent = "Sua vez";
  }
}

statusEl.textContent = "Sua vez (brancas)";
draw();
</script>

</body>
</html>
