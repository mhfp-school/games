<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FPS 3D COM IA (YUKA)</title>
<style>
body { margin:0; overflow:hidden; }
#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:10px; height:10px;
  margin-left:-5px; margin-top:-5px;
  border:2px solid white;
  border-radius:50%;
}
</style>
</head>
<body>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="yuka.min.js"></script>

<script>
// ===== THREE SETUP =====
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// chão
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshBasicMaterial({color:0x222244, side:THREE.DoubleSide})
);
floor.rotation.x = Math.PI/2;
scene.add(floor);

camera.position.set(0,1.8,5);

// ===== POINTER LOCK (FPS REAL) =====
document.body.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// ===== CONTROLES =====
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// ===== BOT =====
let botMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(botMesh);

// ===== YUKA =====
let entityManager = new YUKA.EntityManager();
let time = new YUKA.Time();

let bot = new YUKA.Vehicle();
bot.maxSpeed = 3;

let target = new YUKA.GameEntity();

entityManager.add(bot);
entityManager.add(target);

let seek = new YUKA.SeekBehavior(target.position);
bot.steering.add(seek);

bot.setRenderComponent(botMesh, (entity, renderComponent)=>{
  renderComponent.position.copy(entity.position);
});

// posição inicial
bot.position.set(5,0,0);

// ===== TIRO (RAYCAST FPS) =====
let raycaster = new THREE.Raycaster();

document.addEventListener("click", ()=>{
  if(document.pointerLockElement !== document.body) return;

  let direction = new THREE.Vector3();
  camera.getWorldDirection(direction);

  raycaster.set(camera.position, direction);
  let hit = raycaster.intersectObject(botMesh);

  if(hit.length > 0){
    alert("Você matou o bot!");
    location.reload();
  }
});

// ===== BOT ATIRA =====
function botShoot(){
  if(Math.random() < 0.01){
    let dx = camera.position.x - bot.position.x;
    let dz = camera.position.z - bot.position.z;
    let dist = Math.sqrt(dx*dx+dz*dz);

    if(dist < 15){
      if(Math.random() < 0.5){
        alert("Bot te matou!");
        location.reload();
      }
    }
  }
}

// ===== UPDATE =====
function update(){
  // movimento FPS correto
  let speed = 0.1;
  let forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  let right = new THREE.Vector3(Math.sin(yaw-Math.PI/2),0,Math.cos(yaw-Math.PI/2));

  if(keys["w"]) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys["s"]) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys["a"]) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys["d"]) camera.position.add(right.clone().multiplyScalar(speed));

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // YUKA update
  target.position.set(camera.position.x,0,camera.position.z);
  let delta = time.update().getDelta();
  entityManager.update(delta);

  botShoot();
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
