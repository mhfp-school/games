<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FPS 3D DECENTE</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#crosshair {
  position:fixed;
  top:50%; left:50%;
  width:8px; height:8px;
  margin-left:-4px; margin-top:-4px;
  border:2px solid white;
  border-radius:50%;
}
</style>
</head>
<body>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="yuka.min.js"></script>

<script>
// ===== SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202030);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.8,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
light.castShadow = true;
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// ===== CHÃO =====
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x303050})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// ===== PAREDES =====
let walls = [];
for(let i=0;i<15;i++){
  let wall = new THREE.Mesh(
    new THREE.BoxGeometry(3,3,3),
    new THREE.MeshStandardMaterial({color:0x888888})
  );
  wall.position.set((Math.random()-0.5)*40,1.5,(Math.random()-0.5)*40);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);
  walls.push(wall);
}

// ===== BOT =====
const botMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
botMesh.castShadow = true;
scene.add(botMesh);

// ===== YUKA =====
const entityManager = new YUKA.EntityManager();
const time = new YUKA.Time();

const bot = new YUKA.Vehicle();
bot.maxSpeed = 4;

const target = new YUKA.GameEntity();

entityManager.add(bot);
entityManager.add(target);

const seek = new YUKA.SeekBehavior(target.position);
bot.steering.add(seek);

bot.setRenderComponent(botMesh, (entity, renderComponent)=>{
  renderComponent.position.copy(entity.position);
});

bot.position.set(5,0,0);

// ===== POINTER LOCK =====
document.body.addEventListener("click", ()=>{
  document.body.requestPointerLock();
});

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement === document.body){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// ===== MOVIMENTO CORRETO =====
let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

function move(){
  let speed = 0.15;

  let forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
  let right = new THREE.Vector3(Math.sin(yaw - Math.PI/2),0,Math.cos(yaw - Math.PI/2));

  if(keys['w']) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys['s']) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys['a']) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys['d']) camera.position.add(right.clone().multiplyScalar(speed));

  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

// ===== TIRO (RAYCAST) =====
const raycaster = new THREE.Raycaster();

document.addEventListener("click", ()=>{
  if(document.pointerLockElement !== document.body) return;

  let dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  raycaster.set(camera.position, dir);
  let hit = raycaster.intersectObject(botMesh);

  if(hit.length > 0){
    alert("Matou o bot");
    location.reload();
  }
});

// ===== BOT TIRO =====
function botShoot(){
  if(Math.random() < 0.01){
    let dist = camera.position.distanceTo(bot.position);
    if(dist < 20 && Math.random() < 0.5){
      alert("Você morreu");
      location.reload();
    }
  }
}

// ===== UPDATE =====
function update(){
  move();

  target.position.set(camera.position.x,0,camera.position.z);
  let delta = time.update().getDelta();
  entityManager.update(delta);

  botShoot();
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
